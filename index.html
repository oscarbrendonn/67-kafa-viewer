<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>67 Karakter — Kafa Önizleme</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2030, #0b0d12 70%);
    color: #e8eaf0; min-height: 100vh;
  }
  header { text-align: center; padding: 22px 16px 6px; }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
  header p { margin: 6px 0 0; color: #9aa3b5; font-size: 13px; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    max-width: 1200px; margin: 14px auto; padding: 0 16px 28px;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #11151e; border: 1px solid #232a38; border-radius: 16px;
    overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .card h2 {
    margin: 0; padding: 12px 16px; font-size: 15px; font-weight: 600;
    border-bottom: 1px solid #1d2431; display: flex; justify-content: space-between; align-items: center;
  }
  .tag { font-size: 11px; color: #8b94a7; font-weight: 500; }
  model-viewer { width: 100%; height: 64vh; min-height: 380px; background: #0e1219; --poster-color: transparent; }
  .foot { text-align: center; color: #6b7488; font-size: 12px; padding: 0 16px 30px; }
  .pill { display:inline-block; background:#1a2233; border:1px solid #2a3450; color:#aeb8cc;
          border-radius:999px; padding:3px 10px; font-size:11px; margin:0 3px; }
</style>
</head>
<body>
  <header>
    <h1>67 Karakter — Kafa Önizleme</h1>
    <p>Mouse ile döndür · scroll ile yakınlaş · iki tasarımı karşılaştır</p>
  </header>
  <div class="grid">
    <div class="card">
      <h2>KAFA A <span class="tag">ön + yan füzyon</span></h2>
      <model-viewer src="A.glb" alt="Kafa A" camera-controls touch-action="pan-y"
        auto-rotate auto-rotate-delay="1500" rotation-per-second="18deg"
        environment-image="neutral" exposure="1.05" shadow-intensity="0.6"
        camera-orbit="0deg 82deg 1.1m" min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 180deg auto" interaction-prompt="none"></model-viewer>
    </div>
    <div class="card">
      <h2>KAFA B <span class="tag">sadece ön · daha benzer</span></h2>
      <model-viewer src="B.glb" alt="Kafa B" camera-controls touch-action="pan-y"
        auto-rotate auto-rotate-delay="1500" rotation-per-second="18deg"
        environment-image="neutral" exposure="1.05" shadow-intensity="0.6"
        camera-orbit="0deg 82deg 1.1m" min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 180deg auto" interaction-prompt="none"></model-viewer>
    </div>
  </div>
  <div class="foot">
    <span class="pill">4K doku</span><span class="pill">meshopt</span><span class="pill">67 World</span>
  </div>
</body>
</html>
