<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>67 Karakter — Tam Karakter (KAFA B)</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2030, #0b0d12 70%);
    color: #e8eaf0; min-height: 100vh;
  }
  header { text-align: center; padding: 22px 16px 4px; }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
  header p { margin: 6px 0 0; color: #9aa3b5; font-size: 13px; }
  .wrap { max-width: 760px; margin: 12px auto; padding: 0 16px 26px; }
  .card {
    background: #11151e; border: 1px solid #232a38; border-radius: 18px; overflow: hidden;
    box-shadow: 0 14px 40px rgba(0,0,0,.4);
  }
  model-viewer { width: 100%; height: 78vh; min-height: 460px; background: #0e1219; }
  .chips { text-align:center; margin-top: 14px; }
  .pill { display:inline-block; background:#1a2233; border:1px solid #2a3450; color:#aeb8cc;
          border-radius:999px; padding:4px 12px; font-size:12px; margin:3px; }
  .note { text-align:center; color:#7f8aa0; font-size:12px; margin-top:10px; line-height:1.5; }
</style>
</head>
<body>
  <header>
    <h1>67 Karakter — Tam Karakter</h1>
    <p>KAFA B · mouse ile döndür · scroll ile yakınlaş</p>
  </header>
  <div class="wrap">
    <div class="card">
      <model-viewer src="char.glb" alt="67 Karakter" camera-controls touch-action="pan-y"
        auto-rotate auto-rotate-delay="1200" rotation-per-second="16deg"
        environment-image="neutral" exposure="1.05" shadow-intensity="0.7"
        camera-orbit="0deg 85deg 2.4m" min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 180deg auto" interaction-prompt="none"></model-viewer>
    </div>
    <div class="chips">
      <span class="pill">4K doku</span><span class="pill">oran düzeltildi</span>
      <span class="pill">göğüs: 67 logo</span><span class="pill">Draco</span>
    </div>
    <div class="note">Önden göğüsteki 67 logosuna, arkadan üst-sırta bak (orada düzeltilecek bir leke var).</div>
  </div>
</body>
</html>
